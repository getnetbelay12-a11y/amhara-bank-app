name: amhara_bank_mobile
description: Amhara Bank member app PoC
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2
  http: ^1.2.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/amhara-bank-logo.png
    - assets/images/amhara-bank-mark.png
    - assets/images/ethiotelecom-logo.png
    - assets/images/safaricom-logo.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/amhara-bank-mark.png
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
