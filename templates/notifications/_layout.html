<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#14213d;">
    <div style="padding:24px 12px;">
      <div style="max-width:640px;margin:0 auto;background:#ffffff;border:1px solid #dbe6f5;border-radius:20px;overflow:hidden;box-shadow:0 12px 30px rgba(15,32,72,0.08);">
        <div style="padding:28px 28px 20px;background:#0b2f6b;color:#ffffff;">
          <div style="display:flex;align-items:center;gap:14px;">
            <img src="{{logoUrl}}" alt="Amhara Bank" style="width:52px;height:52px;object-fit:contain;background:#ffffff;border-radius:14px;padding:8px;" />
            <div>
              <div style="font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:#f5c84c;font-weight:700;">Amhara Bank</div>
              <h1 style="margin:6px 0 0;font-size:28px;line-height:1.15;color:#ffffff;">{{title}}</h1>
            </div>
          </div>
        </div>
        <div style="padding:28px;">
          {{englishContent}}
          <hr style="border:none;border-top:1px solid #dbe6f5;margin:28px 0;" />
          {{amharicContent}}
        </div>
      </div>
    </div>
  </body>
</html>
